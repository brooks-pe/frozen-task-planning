<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>SyncPoint Prototype</title>
    <script>
      // GitHub Pages SPA fallback:
      // Redirect unknown deep links to index while preserving route/query/hash.
      // segmentCount = 1 for /frozen-task-planning on Pages.
      (function () {
        var segmentCount = 1;
        var l = window.location;
        var base = l.pathname.split('/').slice(0, 1 + segmentCount).join('/');
        var path = l.pathname.slice(1).split('/').slice(segmentCount).join('/');
        var query = l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '';
        var hash = l.hash || '';

        l.replace(
          l.protocol +
            '//' +
            l.hostname +
            (l.port ? ':' + l.port : '') +
            base +
            '/?/' +
            path.replace(/&/g, '~and~') +
            query +
            hash
        );
      })();
    </script>
  </head>
  <body></body>
</html>
